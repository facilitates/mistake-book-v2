# ── 开发环境配置 (SQLite + 本地 Redis) ──
spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${user.home}/mistake-book/mistakes_v2.db
    # SQLite 不需要连接池验证
    hikari:
      connection-test-query: SELECT 1
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

# 开发环境允许跨域
cors:
  allowed-origins: "*"
