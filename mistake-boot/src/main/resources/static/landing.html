<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>错题本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafbfc;--surface:#ffffff;
  --text:#1a1a2e;--text-secondary:#5f6b7a;--text-tertiary:#94a3b8;
  --accent:#3b5ccc;--accent-hover:#3451b0;
  --border:#e2e8f0;--border-light:#f1f5f9;
  --danger:#dc2626;--purple:#7c3aed;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.04),0 2px 6px rgba(0,0,0,0.06);
  --font:'Inter',-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}

/* ── Main ── */
.main{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 52px - var(--safe-bottom));padding:24px 24px calc(24px + var(--safe-bottom))}
.hero{margin-bottom:32px;text-align:center}
.hero h1{font-size:22px;font-weight:700;margin-bottom:4px}
.hero p{font-size:13px;color:var(--text-secondary)}

/* ── Actions ── */
.actions{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
.btn{width:100%;padding:16px 24px;border-radius:var(--radius-lg);font-size:16px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;text-align:center;border:none;min-height:56px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon{font-size:20px}

/* ── Upload hidden input ── */
#uploadInput{display:none}

/* ── Status ── */
#status{font-size:12px;color:var(--text-secondary);text-align:center;margin-top:12px;min-height:18px}

/* ── Responsive ── */
@media(max-width:480px){
  .main{padding:20px 16px calc(20px + var(--safe-bottom))}
  .hero h1{font-size:20px}
  .btn{font-size:15px;padding:14px 20px;min-height:52px}
}
</style>
</head>
<body>

<style>
/* ── Prevent layout shift from scrollbar ── */
html{scrollbar-gutter:stable}
/* ── Nav ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);padding-top:var(--safe-top);contain:layout style}
.nav-brand{font-size:16px;font-weight:700;color:var(--text)}
.nav-links{display:flex;align-items:center;gap:16px}
.nav-links a{font-size:12px;color:var(--text-secondary);text-decoration:none;font-weight:500}
.nav-links a:hover{color:var(--accent)}
.nav-links a.active{color:var(--accent);font-weight:600}
.nav-user{font-size:11px;color:var(--text-tertiary)}
.nav-logout{font-size:11px;background:none;border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;color:var(--text-secondary);cursor:pointer;font-family:var(--font);min-height:32px}
.nav-logout:hover{border-color:var(--danger);color:var(--danger)}
.nav-settings{display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--text-tertiary);line-height:1;flex-shrink:0}
.nav-settings:hover{color:var(--text)}
/* ── Nav responsive ── */
@media(max-width:768px){.nav{padding:0 16px;height:46px}}
@media(max-width:480px){.nav{padding:0 16px;height:46px}}
</style>

<nav class="nav">
  <span class="nav-brand">错题本</span>
  <div class="nav-links">
    <a href="landing.html" class="active">首页</a>
    <a href="dashboard.html">控制台</a>
    <a href="cards.html">题库</a>
    <a href="review.html">复习</a>
    <span class="nav-user" id="navUser"></span>
    <button class="nav-logout" onclick="logout()">退出</button>
    <button class="nav-settings" onclick="openSettings()" title="设置"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
</nav>


<main class="main">
  <div class="hero">
    <h1 id="heroTitle">今天学了什么？</h1>
    <p id="heroSub">拍照上传错题，或开始复习已掌握的题目</p>
  </div>
  <div class="actions">
    <input type="file" id="uploadInput" accept="image/*" multiple onchange="handleUpload(this)">
    <button class="btn btn-primary" onclick="document.getElementById('uploadInput').click()">
      <span class="btn-icon">📷</span> 上传题目
    </button>
    <button class="btn btn-secondary" onclick="location.href='landing.html'+'review'">
      <span class="btn-icon">🔄</span> 开始复习
    </button>
  </div>
  <div id="status"></div>
</main>

<script>
var API='/api/v2/';
// Daily rotating encouragements — pick by day-of-year
const ENCOURAGEMENTS=[
  '每一个今天，都是未来的你在求救',
  '慢慢来，比较快',
  '你背不下来的书，总有人能背下来',
  '今天不学习，明天变垃圾',
  '放弃不难，但坚持一定很酷',
  '乾坤未定，你我皆是黑马',
  '星光不问赶路人',
  '没有人能让你输，除非你不想赢',
  '你的对手都在翻书',
  '最怕一生碌碌无为，还说平凡难能可贵',
  '且视他人之疑目如盏盏鬼火，大胆去走你的夜路',
  '半山腰太挤了，去山顶看看',
  '你要悄悄拔尖，然后惊艳所有人',
  '所谓无底深渊，下去也是前程万里',
  '当你觉得晚了的时候，恰恰是最早的时候',
  '没有一个冬天不可逾越',
  '努力只能及格，拼命才能优秀',
  '如果你知道去哪，全世界都会为你让路',
  '煎和熬都是变美味的方式',
  '总有人要赢的，为什么不能是你',
  '今天翻的是书，明天数的是钱',
  '吃得苦中苦，方为人上人',
  '人生没有白走的路，每一步都算数',
  '既然选择了远方，便只顾风雨兼程',
  '别让未来的你，讨厌现在的自己',
  '将来的你，一定会感谢现在拼命的自己',
  '莫道君行早，更有早行人',
  '你有多努力，就有多特殊',
  '哪有什么一夜成名，其实都是百炼成钢',
  '不走心的努力，都是在敷衍自己',
  '熬过无人问津的日子，才有诗和远方'
];
(function(){
  const dayOfYear=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  document.getElementById('heroTitle').textContent=ENCOURAGEMENTS[dayOfYear%ENCOURAGEMENTS.length];
})();

async function init(){
  try{const r=await fetch(API+'auth/me');const me=await r.json();if(!me||me.code!==200){location.href='login.html';return};document.getElementById('navUser').textContent=me.username}
  catch(e){location.href='landing.html'+'login';return}
  loadStats();
}

async function loadStats(){
  try{
    const r=await fetch(API+'stats');const d=await r.json();
    const due=d.due_today||0;
    document.getElementById('heroSub').textContent=due
      ?`还有 ${due} 道题目待复习，加油！`
      :'所有题目均已掌握，厉害！';
  }catch(e){}
}

async function handleUpload(input){
  const files=[...input.files];if(!files.length)return;
  const st=document.getElementById('status');
  st.textContent=`上传 ${files.length} 张图片中…`;
  const fd=new FormData();files.forEach(f=>fd.append('files',f));
  try{
    const r=await fetch(API+'upload',{method:'POST',body:fd});const d=await r.json();
    if(!r.ok){st.textContent=d.error||'上传失败';return}
    const tasks=d.tasks||[];let done=0,errors=[];
    while(done+errors.length<tasks.length){
      await new Promise(r=>setTimeout(r,2000));
      const sr=await fetch(API+'tasks/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks})});const st2=await sr.json();
      done=0;errors=[];
      for(const t of tasks){
        const s=st2[t];if(!s)continue;
        if(s.status==='done')done++;
        else if(s.status==='error')errors.push(s.error||'未知错误');
      }
      st.textContent=`识别中… ${done+errors.length}/${tasks.length} (${done}完成)`;
    }
    if(errors.length)st.textContent=`完成: ${done}成功, ${errors.length}失败 — ${errors.join('; ')}`;
    else{st.textContent=`✅ 成功添加 ${done} 道题目！`;setTimeout(()=>st.textContent='',3000)}
  }catch(e){st.textContent='上传失败: '+(e.message||e)}
  finally{input.value=''}
}

async function logout(){await fetch(API+'auth/logout',{method:'POST'});location.href='landing.html'+'login'}
init();
</script>

<style>
/* ── Settings modal (scoped so it works even if page lacks modal CSS) ── */
.modal-overlay.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center;padding:16px}
.modal-overlay.settings-overlay.show{display:flex}
.settings-overlay .modal-sheet{background:var(--surface);width:100%;max-height:85vh;border-radius:var(--radius-lg);overflow-y:auto;padding:20px 18px;-webkit-overflow-scrolling:touch;animation:fadeScale .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.12)}
@keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{float:right;background:none;border:none;font-size:22px;color:var(--text-tertiary);cursor:pointer;padding:4px 8px;line-height:1}
@media(max-width:480px){
  .modal-overlay.settings-overlay{align-items:flex-end;padding:0}
  .settings-overlay .modal-sheet{max-width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding-bottom:calc(20px + var(--safe-bottom))}
}
</style>

<div class="modal-overlay settings-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-sheet" style="max-width:480px">
    <button class="modal-close" onclick="closeSettings()">&times;</button>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:6px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 自定义科目</h2>
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">添加非考研科目，你和朋友都能用</p>
    <div id="settingsList" style="margin-bottom:14px"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="newSubject" placeholder="科目名称" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);min-height:36px">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="newTopics" placeholder="子类，逗号分隔 如: 力学,电磁学" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);min-height:36px">
    </div>
    <button onclick="addCustomSubject()" style="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">+ 添加科目</button>
  </div>
</div>

<script>
function openSettings(){document.getElementById('settingsModal').classList.add('show');loadCustomSubjects()}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}
async function loadCustomSubjects(){
  try{
    const r=await fetch(API+'custom-subjects');const subs=await r.json();
    const list=document.getElementById('settingsList');
    if(!subs.length){list.innerHTML='<p style="font-size:12px;color:var(--text-tertiary)">暂无自定义科目</p>';return}
    list.innerHTML=subs.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:6px"><div><span style="font-weight:600;font-size:13px">${s.subject}</span><span style="font-size:11px;color:var(--text-tertiary);margin-left:6px">${(s.topics||[]).join('、')||'无子类'}</span></div><button onclick="deleteCustomSubject(${s.id})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px">✕</button></div>`).join('');
  }catch(e){}
}
async function addCustomSubject(){
  const subj=document.getElementById('newSubject').value.trim();if(!subj)return alert('请输入科目名称');
  const topics=document.getElementById('newTopics').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
  try{
    await fetch(API+'custom-subjects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:subj,topics})});
    document.getElementById('newSubject').value='';document.getElementById('newTopics').value='';loadCustomSubjects();
    if(typeof updateSubjectFilters==='function')updateSubjectFilters();
  }catch(e){alert('添加失败')}
}
async function deleteCustomSubject(id){
  if(!confirm('确定删除？'))return;
  await fetch(API+'custom-subjects',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  loadCustomSubjects();
  if(typeof updateSubjectFilters==='function')updateSubjectFilters();
}
</script>

</body>
</html>
