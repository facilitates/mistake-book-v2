<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>错题本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafbfc;--surface:#ffffff;--surface-hover:#f4f5f7;
  --text:#1a1a2e;--text-secondary:#5f6b7a;--text-tertiary:#94a3b8;
  --accent:#3b5ccc;--accent-hover:#3451b0;
  --border:#e2e8f0;--border-light:#f1f5f9;
  --success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.04),0 2px 6px rgba(0,0,0,0.06);
  --font:'Inter',-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}

/* ── Main ── */
.main{max-width:1100px;margin:0 auto;padding:24px 20px 40px}

/* ── Page header ── */
.page-header{margin-bottom:20px}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:2px}
.page-header p{font-size:13px;color:var(--text-secondary)}

/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);transition:box-shadow .15s;min-height:90px;display:flex;flex-direction:column;justify-content:center}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:30px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.stat-card.accent .stat-value{color:var(--accent)}
.stat-card.success .stat-value{color:var(--success)}
.stat-card.warning .stat-value{color:var(--warning)}
.stat-card.danger .stat-value{color:var(--danger)}

/* ── Charts row ── */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.chart-box h2{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px}
.chart-body{height:250px}

/* ── Bottom row ── */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.panel h2{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px}

/* ── Recent list ── */
.recent-list{display:flex;flex-direction:column;gap:2px}
.recent-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--radius);transition:background .12s;min-height:44px}
.recent-item:hover{background:var(--surface-hover)}
.recent-item .ri-tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;line-height:1.4}
.tag-math{background:#eef2ff;color:var(--accent)}
.tag-ds{background:#f0fdf4;color:var(--success)}
.tag-org{background:#fff7ed;color:var(--warning)}
.tag-os{background:#fefce8;color:var(--warning)}
.tag-net{background:#fef2f2;color:var(--danger)}
.tag-linear{background:#f5f3ff;color:#7c3aed}
.ri-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:500;min-width:0}
.ri-date{color:var(--text-tertiary);font-size:10px;white-space:nowrap}

/* ── Quick actions ── */
.actions{display:flex;flex-direction:column;gap:8px}
.btn{width:100%;padding:12px 16px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit;text-align:center;border:none;min-height:44px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-hover);border-color:#cbd5e1}
.quick-meta{font-size:12px;color:var(--text-secondary);text-align:center;padding-top:2px}
.quick-meta b{font-weight:600}

/* ── Empty states ── */
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:12px}

/* ══════ RESPONSIVE ══════ */

/* Desktop wide (>1200px) — more breathing room */
@media(min-width:1200px){
  .main{max-width:1200px;padding:32px 32px 48px}
  .stat-grid,.chart-row,.bottom-row{gap:14px}
  .stat-value{font-size:34px}
  .chart-body{height:280px}
}

/* Desktop standard (1024-1200px) — default, no changes needed */

/* Tablet landscape (768-1024px) */
@media(max-width:1024px){
  .main{padding:20px 16px 32px}
  .stat-grid{gap:8px}
  .stat-card{padding:14px}
  .stat-value{font-size:26px}
  .chart-body{height:220px}
}

/* Tablet portrait / Phone landscape (480-768px) */
@media(max-width:768px){
  .main{padding:16px 12px 28px}
  .page-header h1{font-size:19px}
  .page-header p{font-size:12px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:12px 14px;min-height:80px}
  .stat-value{font-size:24px}
  .stat-label{font-size:10px}
  .stat-sub{font-size:10px}
  .chart-row,.bottom-row{grid-template-columns:1fr;gap:8px}
  .chart-body{height:200px}
}

/* Phone portrait (<480px) — one hand, tight */
@media(max-width:480px){
  .main{padding:14px 10px 24px}
  .page-header{margin-bottom:14px}
  .page-header h1{font-size:17px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-card{padding:10px 12px;min-height:72px;border-radius:var(--radius)}
  .stat-value{font-size:22px}
  .chart-body{height:180px}
  .chart-box,.panel{padding:12px;border-radius:var(--radius)}
  .recent-item{padding:6px 8px;min-height:40px}
  .ri-name{font-size:12px}
  .btn{padding:10px 14px;font-size:13px;min-height:42px}
}
</style>
</head>
<body>

@media(max-width:768px){.nav{padding:0 16px;height:46px}}

</style>

<main class="main">
  <header class="page-header">
    <h1>控制台</h1>
    <p id="pageSub">加载中…</p>
  </header>

  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">总题数</div>
      <div class="stat-value" id="sTotal">—</div>
      <div class="stat-sub" id="sTotalSub"></div>
    </div>
    <div class="stat-card success">
      <div class="stat-label">已掌握</div>
      <div class="stat-value" id="sMastered">—</div>
      <div class="stat-sub" id="sMasteredSub"></div>
    </div>
    <div class="stat-card warning">
      <div class="stat-label">复习中</div>
      <div class="stat-value" id="sReviewing">—</div>
      <div class="stat-sub" id="sReviewingSub"></div>
    </div>
    <div class="stat-card accent">
      <div class="stat-label">今日待复习</div>
      <div class="stat-value" id="sDue">—</div>
      <div class="stat-sub" id="sDueSub"></div>
    </div>
    <div class="stat-card" style="border-left:3px solid var(--purple)">
      <div class="stat-label">本周复习</div>
      <div class="stat-value" id="sTime" style="font-size:28px;color:var(--purple)">—</div>
      <div class="stat-sub" id="sTimeSub"></div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-box">
      <h2>各科分布</h2>
      <div class="chart-body" id="pieChart"></div>
    </div>
    <div class="chart-box">
      <h2>复习时间 · 近7天</h2>
      <div class="chart-body" id="lineChart"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="panel">
      <h2>最近添加</h2>
      <div class="recent-list" id="recentList"></div>
    </div>
    <div class="panel">
      <h2>快捷操作</h2>
      <div class="actions">
        <button class="btn btn-primary" onclick="location.href='landing.html'+'review'">开始复习</button>
        <button class="btn btn-secondary" onclick="location.href='landing.html'+'cards'">浏览全部题目</button>
        <div class="quick-meta" id="quickStats"></div>
      </div>
    </div>
  </div>
</main>

<script>
var API='/api/v2/';
const TAG={'高等数学':'tag-math','线性代数':'tag-linear','数据结构':'tag-ds','计算机组成原理':'tag-org','操作系统':'tag-os','计算机网络':'tag-net'};
const COLORS={'高等数学':'#3b5ccc','线性代数':'#7c3aed','数据结构':'#16a34a','计算机组成原理':'#d97706','操作系统':'#eab308','计算机网络':'#dc2626'};

let pieChart,lineChart;

async function init(){
  try{const r=await fetch(API+'me');const me=await r.json();if(!me){location.href='landing.html'+'login';return};document.getElementById('navUser').textContent=me.username}
  catch(e){location.href='landing.html'+'login';return}

  try{
    const r=await fetch(API+'dashboard');const d=await r.json();
    const due=d.due_today||0;
    document.getElementById('pageSub').textContent=due?`今天 ${due} 道题目待复习`:'所有题目均已掌握';
    renderStats(d);renderPie(d.by_subject||{});renderLine(d.review_time_trend||[]);renderRecent(d.recent||[]);renderQuick(d);
    loadReviewTime(d);
  }catch(e){console.error(e)}
}

function renderStats(d){
  const t=d.total||0,m=d.mastered||0,r=d.reviewing||0,due=d.due_today||0;
  document.getElementById('sTotal').textContent=t;
  document.getElementById('sMastered').textContent=m;
  document.getElementById('sReviewing').textContent=r;
  document.getElementById('sDue').textContent=due;
  const pct=t?Math.round(m/t*100):0;
  document.getElementById('sTotalSub').textContent=pct+'% 掌握率';
  document.getElementById('sMasteredSub').textContent=pct+'% 进度';
  document.getElementById('sReviewingSub').textContent='待巩固';
  document.getElementById('sDueSub').textContent=due?'今天到期':'暂无';
}

function renderPie(bySubject){
  const data=Object.entries(bySubject).map(([name,value])=>({name,value,itemStyle:{color:COLORS[name]||'#3b5ccc'}}));
  const el=document.getElementById('pieChart');
  if(!data.length){el.innerHTML='<div class="empty">暂无数据</div>';return}
  pieChart=echarts.init(el);
  pieChart.setOption({
    tooltip:{trigger:'item',backgroundColor:'#fff',borderColor:'#e2e8f0',textStyle:{color:'#1a1a2e',fontSize:12},extraCssText:'box-shadow:0 4px 12px rgba(0,0,0,.08);border-radius:8px'},
    series:[{type:'pie',radius:['52%','80%'],center:['50%','50%'],avoidLabelOverlap:true,
      label:{show:true,position:'outside',formatter:'{b}\n{d}%',color:'#5f6b7a',fontSize:11,distanceToLabelLine:4},
      labelLine:{show:true,length:12,length2:16,smooth:true},
      emphasis:{label:{fontSize:14,fontWeight:'bold'}},data}]});
}

function renderLine(trend){
  const el=document.getElementById('lineChart');
  if(!trend.length){el.innerHTML='<div class="empty">暂无数据</div>';return}
  lineChart=echarts.init(el);
  const minutes=trend.map(t=>Math.round(t.total_seconds/60));
  const hasData=minutes.some(v=>v>0);
  lineChart.setOption({
    tooltip:{trigger:'axis',backgroundColor:'#fff',borderColor:'#e2e8f0',textStyle:{color:'#1a1a2e',fontSize:12},extraCssText:'box-shadow:0 4px 12px rgba(0,0,0,.08);border-radius:8px',
      formatter:function(p){return p[0].axisValue+'<br/>复习 '+p[0].value+' min'}},
    grid:{left:36,right:16,top:16,bottom:28},
    xAxis:{type:'category',data:trend.map(t=>t.date.slice(5)),axisLine:{lineStyle:{color:'#e2e8f0'}},axisLabel:{color:'#94a3b8',fontSize:11}},
    yAxis:{type:'value',name:hasData?'min':'',nameTextStyle:{color:'#94a3b8',fontSize:10},minInterval:1,splitLine:{lineStyle:{color:'#f1f5f9'}},axisLabel:{color:'#94a3b8',fontSize:11}},
    series:[{type:'bar',data:minutes,barWidth:20,
      itemStyle:{color:'#3b5ccc',borderRadius:[4,4,0,0]},
      emphasis:{itemStyle:{color:'#3451b0'}}}]});
}

function renderRecent(recent){
  const el=document.getElementById('recentList');
  if(!recent.length){el.innerHTML='<div class="empty" style="padding:20px">暂无错题</div>';return}
  el.innerHTML=recent.map(m=>`
    <div class="recent-item">
      <span class="ri-tag ${TAG[m.subject]||''}">${m.subject}·${m.topic}</span>
      <span class="ri-name">${(m.problem_text||'题目').substring(0,30)}</span>
      <span class="ri-date">${(m.created_at||'').slice(0,10)}</span>
    </div>`).join('');
}

function renderQuick(d){
  document.getElementById('quickStats').innerHTML=`掌握率 <b>${d.total?Math.round(d.mastered/d.total*100):0}%</b> · 连续 <b>${d.streak||0}</b> 天`;
}

async function logout(){await fetch(API+'auth/logout',{method:'POST'});location.href='landing.html'+'login'}

function fmtTime(s){
  if(!s)return'—';
  const m=Math.round(s/60);
  if(m<60)return m+'min';
  const h=Math.floor(m/60),r=m%60;
  return r?h+'h '+r+'min':h+'h';
}
async function loadReviewTime(d){
  const today=fmtTime(d.today_seconds||0);
  try{
    const r=await fetch(API+'review/sessions');const data=await r.json();
    const s=data.stats||{};
    const total=s.total_seconds||0;
    document.getElementById('sTime').textContent=fmtTime(total);
    document.getElementById('sTimeSub').textContent=`今日 ${today} · ${s.sessions||0}次`;
  }catch(e){
    document.getElementById('sTime').textContent=today;
    document.getElementById('sTimeSub').textContent='今日';
  }
}

window.addEventListener('resize',()=>{pieChart?.resize();lineChart?.resize()});
init();
</script>

    </div>
    <button onclick="addCustomSubject()" style="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">+ 添加科目</button>
  </div>
</div>

<script>
function openSettings(){document.getElementById('settingsModal').classList.add('show');loadCustomSubjects()}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}
async function loadCustomSubjects(){
  try{
    const r=await fetch(API+'custom-subjects');const subs=await r.json();
    const list=document.getElementById('settingsList');
    if(!subs.length){list.innerHTML='<p style="font-size:12px;color:var(--text-tertiary)">暂无自定义科目</p>';return}
    list.innerHTML=subs.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:6px"><div><span style="font-weight:600;font-size:13px">${s.subject}</span><span style="font-size:11px;color:var(--text-tertiary);margin-left:6px">${(s.topics||[]).join('、')||'无子类'}</span></div><button onclick="deleteCustomSubject(${s.id})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px">✕</button></div>`).join('');
  }catch(e){}
}
async function addCustomSubject(){
  const subj=document.getElementById('newSubject').value.trim();if(!subj)return alert('请输入科目名称');
  const topics=document.getElementById('newTopics').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
  try{
    await fetch(API+'custom-subjects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:subj,topics})});
    document.getElementById('newSubject').value='';document.getElementById('newTopics').value='';loadCustomSubjects();
    if(typeof updateSubjectFilters==='function')updateSubjectFilters();
  }catch(e){alert('添加失败')}
}
async function deleteCustomSubject(id){
  if(!confirm('确定删除？'))return;
  await fetch(API+'custom-subjects',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  loadCustomSubjects();
  if(typeof updateSubjectFilters==='function')updateSubjectFilters();
}
</script>

</body>
</html>
