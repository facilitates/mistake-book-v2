server:
  port: 8089
  servlet:
    context-path: /api/v2

spring:
  application:
    name: mistake2.0
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # 文件上传
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# ── Sa-Token RBAC 鉴权配置 ──
sa-token:
  # token 名称 (同时也是 cookie 名称)
  token-name: Authorization
  # token 有效期 (30天, 单位: 秒)
  timeout: 2592000
  # token 最低活跃频率 (如果 token 超过此时间没有访问系统就会被冻结, 默认 -1 代表不限制)
  active-timeout: -1
  # 是否允许同一账号多地同时登录 (true=允许, false=不允许)
  is-concurrent: true
  # 在多人登录同一账号时, 是否共用一个 token (true=共用, false=新登录挤掉旧登录)
  is-share: true
  # token 风格: uuid / simple-uuid / random-32 / random-64 / random-128 / tik
  token-style: random-64
  # 是否输出操作日志
  is-log: true
  # 是否从 cookie 中读取 token
  is-read-cookie: false
  # 是否从请求体里读取 token
  is-read-body: false
  # 是否从 header 中读取 token
  is-read-header: true

# ── MyBatis-Plus 配置 ──
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mistake.v2.infrastructure.persistence.po
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ── 日志配置 ──
logging:
  level:
    root: INFO
    com.mistake.v2: DEBUG
    com.baomidou.mybatisplus: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Knife4j API文档 ──
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs
